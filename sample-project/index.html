<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI コンポーネント集 | Training Sample</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header class="page-header">
    <h1 class="page-header__title">UI コンポーネント集</h1>
    <p class="page-header__lead">Claude Code 研修用のサンプルページ</p>
  </header>

  <main class="page-main">
    <!-- Buttons -->
    <section class="section">
      <h2 class="section__title">Button</h2>
      <div class="section__body">
        <button class="btn btn--primary">Primary</button>
        <button class="btn btn--secondary">Secondary</button>
        <button class="btn" disabled>Disabled</button>
      </div>
    </section>

    <!-- Cards -->
    <section class="section">
      <h2 class="section__title">Card</h2>
      <div class="section__body section__body--grid">
        <article class="card">
          <h3 class="card__title">カード見出し A</h3>
          <p class="card__body">カードの本文がここに入ります。短い説明文を想定。</p>
        </article>
        <article class="card">
          <h3 class="card__title">カード見出し B</h3>
          <p class="card__body">2枚目のカードの本文。レイアウトはグリッド。</p>
        </article>
      </div>
    </section>

    <!-- Tag (TODO: 演習2 で追加する) -->
    <section class="section">
      <h2 class="section__title">Tag <small>(未実装)</small></h2>
      <p class="section__note">このセクションには Tag コンポーネントが入る予定です（演習2で追加）。</p>
    </section>
  </main>

  <footer class="page-footer">
    <small>Training Sample &copy; 2026</small>
  </footer>
</body>
</html>
